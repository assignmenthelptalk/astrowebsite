<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="100%" role="img" aria-labelledby="title-990-governance">
  <title id="title-990-governance">Solvency II — Four Key Governance Functions under Board Oversight</title>

  <!-- Background -->
  <rect width="800" height="440" fill="#F8F9FC"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="50" fill="#1B3A6B"/>
  <text x="400" y="32" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#C9A84C" text-anchor="middle">Solvency II — Four Key Governance Functions</text>

  <!-- Board of Directors bar -->
  <rect x="40" y="65" width="720" height="52" rx="6" fill="#1B3A6B"/>
  <text x="400" y="87" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#C9A84C" text-anchor="middle">BOARD OF DIRECTORS</text>
  <text x="400" y="107" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle">Ultimate accountability for governance — owns and challenges the ORSA</text>

  <!-- Vertical connector lines from Board to each panel -->
  <line x1="170" y1="117" x2="170" y2="142" stroke="#1B3A6B" stroke-width="2"/>
  <line x1="390" y1="117" x2="390" y2="142" stroke="#1B3A6B" stroke-width="2"/>
  <line x1="420" y1="117" x2="420" y2="142" stroke="#C9A84C" stroke-width="2"/>
  <line x1="630" y1="117" x2="630" y2="142" stroke="#C9A84C" stroke-width="2"/>

  <!-- Horizontal span lines -->
  <line x1="170" y1="142" x2="390" y2="142" stroke="#1B3A6B" stroke-width="2"/>
  <line x1="420" y1="142" x2="630" y2="142" stroke="#C9A84C" stroke-width="2"/>

  <!-- Drop to panels -->
  <line x1="280" y1="142" x2="280" y2="155" stroke="#1B3A6B" stroke-width="2"/>
  <line x1="520" y1="142" x2="520" y2="155" stroke="#C9A84C" stroke-width="2"/>

  <!-- Panel 1 — Actuarial Function (top left) -->
  <rect x="40" y="155" width="340" height="120" rx="6" fill="#FFFFFF" stroke="#1B3A6B" stroke-width="2"/>
  <rect x="40" y="155" width="340" height="32" rx="6" fill="#1B3A6B"/>
  <rect x="40" y="179" width="340" height="8" fill="#1B3A6B"/>
  <!-- Icon placeholder -->
  <rect x="52" y="164" width="22" height="14" rx="3" fill="#C9A84C"/>
  <text x="400" y="175" font-family="Arial, sans-serif" font-size="7" fill="#C9A84C" text-anchor="end">▲</text>
  <text x="210" y="174" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#C9A84C" text-anchor="middle">ACTUARIAL FUNCTION</text>
  <text x="210" y="204" font-family="Arial, sans-serif" font-size="11" fill="#2C2C2C" text-anchor="middle">Reserve certification &amp; technical provisions</text>
  <text x="210" y="221" font-family="Arial, sans-serif" font-size="11" fill="#2C2C2C" text-anchor="middle">Capital model validation (internal model SCR)</text>
  <text x="210" y="238" font-family="Arial, sans-serif" font-size="11" fill="#2C2C2C" text-anchor="middle">Opinion on underwriting policy &amp; reinsurance adequacy</text>
  <text x="210" y="258" font-family="Arial, sans-serif" font-size="10" fill="#1B3A6B" text-anchor="middle" font-style="italic">Head holds SMCR Prescribed Responsibility</text>

  <!-- Panel 2 — Risk Management Function (top right) -->
  <rect x="420" y="155" width="340" height="120" rx="6" fill="#FFFFFF" stroke="#C9A84C" stroke-width="2"/>
  <rect x="420" y="155" width="340" height="32" rx="6" fill="#1B3A6B"/>
  <rect x="420" y="179" width="340" height="8" fill="#1B3A6B"/>
  <rect x="432" y="164" width="22" height="14" rx="3" fill="#C9A84C"/>
  <text x="590" y="174" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#C9A84C" text-anchor="middle">RISK MANAGEMENT FUNCTION</text>
  <text x="590" y="204" font-family="Arial, sans-serif" font-size="11" fill="#2C2C2C" text-anchor="middle">Risk strategy — identify, measure, monitor, mitigate</text>
  <text x="590" y="221" font-family="Arial, sans-serif" font-size="11" fill="#2C2C2C" text-anchor="middle">ORSA ownership (technical author; Board owns it)</text>
  <text x="590" y="238" font-family="Arial, sans-serif" font-size="11" fill="#2C2C2C" text-anchor="middle">Risk appetite framework monitoring</text>
  <text x="590" y="258" font-family="Arial, sans-serif" font-size="10" fill="#1B3A6B" text-anchor="middle" font-style="italic">Monitors risk profile against Board-approved appetite</text>

  <!-- Panel 3 — Compliance Function (bottom left) -->
  <rect x="40" y="295" width="340" height="120" rx="6" fill="#FFFFFF" stroke="#1B3A6B" stroke-width="2"/>
  <rect x="40" y="295" width="340" height="32" rx="6" fill="#E8ECF4"/>
  <rect x="40" y="319" width="340" height="8" fill="#E8ECF4"/>
  <rect x="52" y="304" width="22" height="14" rx="3" fill="#1B3A6B"/>
  <text x="210" y="314" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1B3A6B" text-anchor="middle">COMPLIANCE FUNCTION</text>
  <text x="210" y="344" font-family="Arial, sans-serif" font-size="11" fill="#2C2C2C" text-anchor="middle">Regulatory reporting (RSR, SFCR — Pillar 3)</text>
  <text x="210" y="361" font-family="Arial, sans-serif" font-size="11" fill="#2C2C2C" text-anchor="middle">Conduct requirements: SMCR, Consumer Duty</text>
  <text x="210" y="378" font-family="Arial, sans-serif" font-size="11" fill="#2C2C2C" text-anchor="middle">Regulatory change monitoring &amp; Board advice</text>
  <text x="210" y="398" font-family="Arial, sans-serif" font-size="10" fill="#1B3A6B" text-anchor="middle" font-style="italic">Manages complaints handling &amp; conduct outcomes</text>

  <!-- Panel 4 — Internal Audit (bottom right) -->
  <rect x="420" y="295" width="340" height="120" rx="6" fill="#FFFFFF" stroke="#C9A84C" stroke-width="2"/>
  <rect x="420" y="295" width="340" height="32" rx="6" fill="#E8ECF4"/>
  <rect x="420" y="319" width="340" height="8" fill="#E8ECF4"/>
  <rect x="432" y="304" width="22" height="14" rx="3" fill="#1B3A6B"/>
  <text x="590" y="314" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1B3A6B" text-anchor="middle">INTERNAL AUDIT</text>
  <text x="590" y="344" font-family="Arial, sans-serif" font-size="11" fill="#2C2C2C" text-anchor="middle">Independent assurance to Board &amp; Audit Committee</text>
  <text x="590" y="361" font-family="Arial, sans-serif" font-size="11" fill="#2C2C2C" text-anchor="middle">Reviews all other three functions (3rd line of defence)</text>
  <text x="590" y="378" font-family="Arial, sans-serif" font-size="11" fill="#2C2C2C" text-anchor="middle">No operational responsibilities — fully independent</text>
  <text x="590" y="398" font-family="Arial, sans-serif" font-size="10" fill="#1B3A6B" text-anchor="middle" font-style="italic">Head of Internal Audit cannot hold executive role</text>

  <!-- Footer -->
  <text x="400" y="430" font-family="Arial, sans-serif" font-size="10" fill="#1B3A6B" text-anchor="middle" opacity="0.7">ciiassignmenthelp.com</text>
</svg>
