<figure class="wp-block-image infographic-figure" style="text-align:center; margin: 2rem auto;">
<svg viewBox="0 0 800 140" xmlns="http://www.w3.org/2000/svg"
     width="100%" style="max-width:800px; display:block; margin:0 auto;"
     role="img" aria-labelledby="svg-sc-passrate">
  <title id="svg-sc-passrate">CII assignment help pass rate — 95% across all CII modules assisted</title>
  <desc>95% of students who used CII Assignment Help passed their CII module on the first attempt, across Certificate, Diploma, and ACII levels</desc>

  <!-- Background -->
  <rect width="800" height="140" fill="#1B3A6B" rx="10"/>

  <!-- Left accent block -->
  <rect width="10" height="140" fill="#C9A84C" rx="5"/>
  <rect x="6" width="8" height="140" fill="#C9A84C"/>

  <!-- Main stat -->
  <text x="160" y="92" font-family="Georgia, serif" font-size="72"
