<svg viewBox="0 0 800 464" xmlns="http://www.w3.org/2000/svg"
     width="100%" style="max-width:800px; display:block; margin:0 auto;"
     role="img" aria-labelledby="svg-title-m05">
  <title id="svg-title-m05">M05 Insurance Law and Practice – Five Key Cases – Subrogation, Insurable Interest, Proximate Cause, Utmost Good Faith, Materiality</title>
  <desc>The five cases most frequently examined in M05 Insurance Law and Practice assessments, showing the doctrine each case establishes and the key rule required for the Examples marking criterion.</desc>

  <!-- Background -->
  <rect width="800" height="464" fill="#F8F9FC" rx="12"/>

  <!-- Header -->
  <rect width="800" height="60" fill="#1B3A6B" rx="12"/>
  <rect y="48" width="800" height="12" fill="#1B3A6B"/>
  <text x="400" y="38" text-anchor="middle" font-family="Georgia, serif"
        font-size="19" font-weight="bold" fill="white">M05 Insurance Law – Five Key Cases Every Student Must Know</text>
  <rect y="60" width="800" height="3" fill="#C9A84C"/>

  <!-- Column header row -->
  <rect x="0" y="63" width="800" height="44" fill="#1B3A6B" opacity="0.07"/>

  <!-- Column headers -->
  <text x="115" y="91" text-anchor="middle" font-family="Georgia, serif"
        font-size="13" font-weight="bold" fill="#1B3A6B">Case &amp; Year</text>
  <text x="355" y="91" text-anchor="middle" font-family="Georgia, serif"
        font-size="13" font-weight="bold" fill="#1B3A6B">Doctrine Established</text>
  <text x="638" y="91" text-anchor="middle" font-family="Georgia, serif"
        font-size="13" font-weight="bold" fill="#1B3A6B">Key Rule</text>

  <!-- Column dividers -->
  <line x1="228" y1="63" x2="228" y2="424" stroke="#ddd" stroke-width="1"/>
  <line x1="482" y1="63" x2="482" y2="424" stroke="#ddd" stroke-width="1"/>

  <!-- ===== ROW 1 – Castellain v Preston [1883] ===== -->
  <rect x="0" y="107" width="800" height="62" fill="white"/>
  <text x="115" y="132" text-anchor="middle" font-family="Georgia, serif"
        font-size="12" font-weight="bold" fill="#C9A84C">Castellain v Preston</text>
  <text x="115" y="150" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" fill="#555">[1883]</text>
  <text x="355" y="141" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="13" fill="#333">Subrogation</text>
  <text x="638" y="128" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" fill="#333">Insurer recovers from third party</text>
  <text x="638" y="146" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" fill="#333">after paying the insured's loss in full.</text>
  <text x="638" y="164" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="10" fill="#888">Insured cannot profit from double recovery.</text>

  <!-- ===== ROW 2 – Macaura v Northern Assurance [1925] ===== -->
  <rect x="0" y="169" width="800" height="62" fill="#1B3A6B" opacity="0.035"/>
  <text x="115" y="194" text-anchor="middle" font-family="Georgia, serif"
        font-size="12" font-weight="bold" fill="#C9A84C">Macaura v Northern</text>
  <text x="115" y="212" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" fill="#555">Assurance [1925]</text>
  <text x="355" y="203" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="13" fill="#333">Insurable Interest</text>
  <text x="638" y="190" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" fill="#333">Shareholder has no insurable interest</text>
  <text x="638" y="208" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" fill="#333">in assets owned by their company.</text>
  <text x="638" y="226" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="10" fill="#888">Interest must be in the asset itself, not the entity owning it.</text>

  <!-- ===== ROW 3 – Leyland Shipping v Norwich Union [1918] ===== -->
  <rect x="0" y="231" width="800" height="62" fill="white"/>
  <text x="115" y="254" text-anchor="middle" font-family="Georgia, serif"
        font-size="12" font-weight="bold" fill="#C9A84C">Leyland Shipping v</text>
  <text x="115" y="272" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" fill="#555">Norwich Union [1918]</text>
  <text x="355" y="265" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="13" fill="#333">Proximate Cause</text>
  <text x="638" y="252" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" fill="#333">Cause proximate in efficiency – not</text>
  <text x="638" y="270" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" fill="#333">in time – determines the insured peril.</text>
  <text x="638" y="288" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="10" fill="#888">Where causes chain, the dominant cause governs.</text>

  <!-- ===== ROW 4 – Carter v Boehm [1766] ===== -->
  <rect x="0" y="293" width="800" height="62" fill="#1B3A6B" opacity="0.035"/>
  <text x="115" y="318" text-anchor="middle" font-family="Georgia, serif"
        font-size="12" font-weight="bold" fill="#C9A84C">Carter v Boehm</text>
  <text x="115" y="336" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" fill="#555">[1766]</text>
  <text x="355" y="327" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="13" fill="#333">Utmost Good Faith</text>
  <text x="638" y="314" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" fill="#333">Both parties must disclose all</text>
  <text x="638" y="332" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" fill="#333">material facts affecting the risk.</text>
  <text x="638" y="350" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="10" fill="#888">Lord Mansfield's foundational uberrimae fidei statement.</text>

  <!-- ===== ROW 5 – Pan Atlantic v Pine Top [1994] ===== -->
  <rect x="0" y="355" width="800" height="62" fill="white"/>
  <text x="115" y="378" text-anchor="middle" font-family="Georgia, serif"
        font-size="12" font-weight="bold" fill="#C9A84C">Pan Atlantic v Pine Top</text>
  <text x="115" y="396" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" fill="#555">[1994]</text>
  <text x="355" y="389" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="13" fill="#333">Materiality Test</text>
  <text x="638" y="376" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" fill="#333">A prudent underwriter would have</text>
  <text x="638" y="394" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" fill="#333">wished to know the undisclosed fact.</text>
  <text x="638" y="412" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="10" fill="#888">Need not be decisive – relevant to risk assessment is sufficient.</text>

  <!-- Footer background and text -->
  <rect x="0" y="424" width="800" height="40" fill="#1B3A6B" opacity="0.05" rx="0"/>
  <text x="400" y="449" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="10" fill="#aaa">ciiassignmenthelp.com – M05 Insurance Law and Practice</text>
</svg>
