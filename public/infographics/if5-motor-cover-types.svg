<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" role="img" aria-labelledby="if5-motor-cover-title">
  <title id="if5-motor-cover-title">IF5 Motor Insurance Cover Types Comparison: Third Party Only, Third Party Fire and Theft, Comprehensive</title>

