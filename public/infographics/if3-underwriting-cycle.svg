<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="100%" role="img" aria-labelledby="if3-cycle-title">
  <title id="if3-cycle-title">The Insurance Underwriting Cycle — Hard Market and Soft Market Phases, IF3 CII</title>

  <!-- Background -->
  <rect width="800" height="460" fill="#F8F9FC"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="60" fill="#1B3A6B"/>
  <text x="400" y="22" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#C9A84C" font-weight="600" letter-spacing="1">IF3 — INSURANCE UNDERWRITING PROCESS</text>
  <text x="400" y="44" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#FFFFFF" font-weight="700">The Underwriting Cycle</text>

  <!-- Large circle background for cycle -->
  <circle cx="400" cy="265" r="165" fill="#FFFFFF" stroke="#E8ECF4" stroke-width="2"/>

  <!-- Hard Market arc (top half) — navy fill -->
  <path d="M 235 265 A 165 165 0 0 1 565 265" fill="#1B3A6B" opacity="0.92"/>

  <!-- Soft Market arc (bottom half) — gold fill -->
  <path d="M 565 265 A 165 165 0 0 1 235 265" fill="#C9A84C" opacity="0.90"/>

  <!-- Centre circle (white overlay for label) -->
  <circle cx="400" cy="265" r="72" fill="#FFFFFF" stroke="#E8ECF4" stroke-width="2"/>
  <text x="400" y="257" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#1B3A6B" font-weight="700">UNDERWRITING</text>
  <text x="400" y="273" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#1B3A6B" font-weight="700">CYCLE</text>
  <text x="400" y="291" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#999">insurance market</text>

  <!-- Hard Market label (top) -->
  <text x="400" y="133" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#FFFFFF" font-weight="700">HARD MARKET</text>

  <!-- Soft Market label (bottom) -->
  <text x="400" y="400" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#FFFFFF" font-weight="700">SOFT MARKET</text>

  <!-- HARD MARKET characteristics (top, left and right) -->
  <text x="280" y="155" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#FFFFFF">High premiums</text>
  <text x="520" y="155" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#FFFFFF">Restricted capacity</text>
  <text x="400" y="175" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#FFFFFF">Strict underwriting criteria</text>

  <!-- SOFT MARKET characteristics (bottom) -->
  <text x="280" y="370" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1B3A6B">Lower premiums</text>
  <text x="520" y="370" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1B3A6B">Increased capacity</text>
  <text x="400" y="388" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1B3A6B">Competitive underwriting</text>

  <!-- Transition arrows and labels -->

  <!-- Arrow: Hard → Soft (right side, going down) -->
  <path d="M 552 210 Q 600 265 552 320" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="548,318 558,326 562,313" fill="#C9A84C"/>

  <!-- Arrow: Soft → Hard (left side, going up) -->
  <path d="M 248 320 Q 200 265 248 210" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="252,212 242,204 238,217" fill="#FFFFFF"/>

  <!-- Transition trigger labels -->
  <!-- Right label: Hard to Soft -->
  <rect x="598" y="237" width="160" height="38" rx="4" fill="#FFFFFF" stroke="#C9A84C" stroke-width="1.5"/>
  <text x="678" y="252" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#1B3A6B" font-weight="600">Hard → Soft:</text>
  <text x="678" y="266" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#2C2C2C">"Profits attract new capital"</text>

  <!-- Left label: Soft to Hard -->
  <rect x="42" y="237" width="160" height="38" rx="4" fill="#FFFFFF" stroke="#1B3A6B" stroke-width="1.5"/>
  <text x="122" y="252" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#1B3A6B" font-weight="600">Soft → Hard:</text>
  <text x="122" y="266" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#2C2C2C">"Losses deplete capital"</text>

  <!-- Legend boxes -->
  <rect x="30" y="80" width="14" height="14" rx="2" fill="#1B3A6B" opacity="0.92"/>
  <text x="50" y="92" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#2C2C2C">Hard market phase</text>
  <rect x="140" y="80" width="14" height="14" rx="2" fill="#C9A84C" opacity="0.90"/>
  <text x="160" y="92" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#2C2C2C">Soft market phase</text>

  <!-- Footer -->
  <text x="400" y="445" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#999">ciiassignmenthelp.com</text>
</svg>
