<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="100%" role="img" aria-labelledby="820-claims-triage-title">
  <title id="820-claims-triage-title">820 Strategic Claims Triage Model: 4-quadrant matrix by claim complexity and strategic value</title>

  <!-- Background -->
  <rect width="800" height="460" fill="#F8F9FC"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="48" fill="#1B3A6B"/>
  <text x="400" y="31" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">820 — Strategic Claims Triage Model</text>

  <!-- Y-axis label -->
  <text x="22" y="270" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1B3A6B" transform="rotate(-90, 22, 270)">CLAIM COMPLEXITY</text>
  <!-- Y-axis arrows -->
  <line x1="38" y1="420" x2="38" y2="72" stroke="#1B3A6B" stroke-width="2"/>
  <polygon points="38,66 33,80 43,80" fill="#1B3A6B"/>
  <!-- Y low/high labels -->
  <text x="42" y="418" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1B3A6B">Low</text>
  <text x="42" y="80" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1B3A6B">High</text>

  <!-- X-axis label -->
  <text x="430" y="448" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1B3A6B">STRATEGIC VALUE</text>
  <!-- X-axis arrows -->
  <line x1="60" y1="430" x2="774" y2="430" stroke="#1B3A6B" stroke-width="2"/>
  <polygon points="780,430 766,425 766,435" fill="#1B3A6B"/>
  <!-- X low/high labels -->
  <text x="64" y="444" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1B3A6B">Low</text>
  <text x="748" y="444" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1B3A6B">High</text>

  <!-- Quadrant boxes -->
  <!-- Bottom-left: FAST TRACK (low complexity, low value) -->
  <rect x="56" y="244" width="356" height="180" rx="4" fill="#E8ECF4" stroke="#1B3A6B" stroke-width="1.5"/>
  <rect x="56" y="244" width="356" height="38" rx="4" fill="#1B3A6B"/>
  <rect x="56" y="264" width="356" height="18" fill="#1B3A6B"/>
  <text x="234" y="268" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#C9A84C">FAST TRACK</text>
  <text x="234" y="306" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#2C2C2C">Automated / digital settlement</text>
  <text x="234" y="324" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#2C2C2C">Low cost, high volume claims</text>
  <text x="234" y="342" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#2C2C2C">Straight-through processing</text>
  <text x="234" y="360" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#2C2C2C">Minimal handler intervention</text>
  <text x="234" y="378" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1B3A6B">Low complexity · Low strategic value</text>

  <!-- Bottom-right: RELATIONSHIP (low complexity, high value) -->
  <rect x="420" y="244" width="356" height="180" rx="4" fill="#E8ECF4" stroke="#1B3A6B" stroke-width="1.5"/>
  <rect x="420" y="244" width="356" height="38" rx="4" fill="#C9A84C"/>
  <rect x="420" y="264" width="356" height="18" fill="#C9A84C"/>
  <text x="598" y="268" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#1B3A6B">RELATIONSHIP</text>
  <text x="598" y="306" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#2C2C2C">Managed by account handler</text>
  <text x="598" y="324" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#2C2C2C">High-value policyholder priority</text>
  <text x="598" y="342" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#2C2C2C">White-glove service model</text>
  <text x="598" y="360" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#2C2C2C">Retention-focused outcomes</text>
  <text x="598" y="378" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1B3A6B">Low complexity · High strategic value</text>

  <!-- Top-left: TPA REFERRAL (high complexity, low value) -->
  <rect x="56" y="72" width="356" height="164" rx="4" fill="#E8ECF4" stroke="#1B3A6B" stroke-width="1.5"/>
  <rect x="56" y="72" width="356" height="38" rx="4" fill="#1B3A6B"/>
  <rect x="56" y="92" width="356" height="18" fill="#1B3A6B"/>
  <text x="234" y="96" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#C9A84C">TPA REFERRAL</text>
  <text x="234" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#2C2C2C">Third party administrator</text>
  <text x="234" y="150" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#2C2C2C">Specialist handling — cost-efficient</text>
  <text x="234" y="168" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#2C2C2C">Delegated claims authority</text>
  <text x="234" y="186" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#2C2C2C">Managed via SLA and bordereau</text>
  <text x="234" y="222" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1B3A6B">High complexity · Low strategic value</text>

  <!-- Top-right: SENIOR CLAIMS (high complexity, high value) -->
  <rect x="420" y="72" width="356" height="164" rx="4" fill="#1B3A6B" stroke="#1B3A6B" stroke-width="1.5"/>
  <rect x="420" y="72" width="356" height="38" rx="4" fill="#C9A84C"/>
  <rect x="420" y="92" width="356" height="18" fill="#C9A84C"/>
  <text x="598" y="96" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#1B3A6B">SENIOR CLAIMS</text>
  <text x="598" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#E8ECF4">In-house specialist team</text>
  <text x="598" y="150" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#E8ECF4">+ legal counsel</text>
  <text x="598" y="168" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#E8ECF4">Board-level visibility</text>
  <text x="598" y="186" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#E8ECF4">Coverage counsel + ADR strategy</text>
  <text x="598" y="222" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#C9A84C">High complexity · High strategic value</text>

  <!-- Footer -->
  <text x="400" y="447" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#999">ciiassignmenthelp.com</text>
</svg>
