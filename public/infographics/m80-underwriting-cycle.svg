<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="100%" role="img" aria-labelledby="m80-cycle-title">
  <title id="m80-cycle-title">M80 Hard vs Soft Underwriting Cycle Comparison</title>

  <!-- Background -->
  <rect width="800" height="420" fill="#F8F9FC"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="48" fill="#1B3A6B"/>
  <text x="400" y="31" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">M80 — Hard vs Soft Underwriting Cycle</text>

  <!-- Cycle arrow background circle (decorative) -->
  <!-- Left panel label: HARD MARKET -->
  <rect x="20" y="62" width="350" height="46" rx="5" fill="#1B3A6B"/>
  <text x="195" y="91" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="bold" fill="#C9A84C">HARD MARKET</text>

  <!-- Right panel label: SOFT MARKET -->
  <rect x="430" y="62" width="350" height="46" rx="5" fill="#C9A84C"/>
  <text x="605" y="91" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B3A6B">SOFT MARKET</text>

  <!-- Cycle arrow in the middle -->
  <text x="400" y="88" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="26" fill="#1B3A6B">&#8635;</text>

  <!-- Row headers column -->
  <!-- Row 1 -->
  <rect x="20" y="114" width="760" height="42" fill="#E8ECF4"/>
  <text x="400" y="133" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1B3A6B">PREMIUM RATES</text>
  <line x1="20" y1="114" x2="780" y2="114" stroke="#1B3A6B" stroke-width="1"/>
  <rect x="20" y="114" width="350" height="42" fill="#E8ECF4"/>
  <text x="195" y="140" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1B3A6B">Rising / above technical rate</text>
  <rect x="430" y="114" width="350" height="42" fill="#E8ECF4"/>
  <text x="605" y="140" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#2C2C2C">Falling / below technical rate</text>

  <!-- Row 2 -->
  <rect x="20" y="160" width="350" height="42" fill="#FFFFFF"/>
  <text x="195" y="178" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1B3A6B">CAPACITY</text>
  <text x="195" y="194" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1B3A6B">Constrained</text>
  <rect x="430" y="160" width="350" height="42" fill="#FFFFFF"/>
  <text x="605" y="178" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#C9A84C">CAPACITY</text>
  <text x="605" y="194" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#2C2C2C">Abundant</text>

  <!-- Row 3 -->
  <rect x="20" y="206" width="350" height="42" fill="#E8ECF4"/>
  <text x="195" y="224" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1B3A6B">UNDERWRITING TERMS</text>
  <text x="195" y="240" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1B3A6B">Strict, selective</text>
  <rect x="430" y="206" width="350" height="42" fill="#E8ECF4"/>
  <text x="605" y="224" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#C9A84C">UNDERWRITING TERMS</text>
  <text x="605" y="240" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#2C2C2C">Competitive, flexible</text>

  <!-- Row 4 -->
  <rect x="20" y="252" width="350" height="42" fill="#FFFFFF"/>
  <text x="195" y="270" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1B3A6B">RATE ADEQUACY</text>
  <text x="195" y="286" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1B3A6B">Above or at technical rate</text>
  <rect x="430" y="252" width="350" height="42" fill="#FFFFFF"/>
  <text x="605" y="270" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#C9A84C">RATE ADEQUACY</text>
  <text x="605" y="286" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#2C2C2C">Below technical rate</text>

  <!-- Row 5 -->
  <rect x="20" y="298" width="350" height="42" fill="#E8ECF4"/>
  <text x="195" y="316" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1B3A6B">NEW CAPITAL</text>
  <text x="195" y="332" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1B3A6B">Attracted to market</text>
  <rect x="430" y="298" width="350" height="42" fill="#E8ECF4"/>
  <text x="605" y="316" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#C9A84C">NEW CAPITAL</text>
  <text x="605" y="332" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#2C2C2C">May exit — poor returns</text>

  <!-- Row 6 -->
  <rect x="20" y="344" width="350" height="42" fill="#FFFFFF"/>
  <text x="195" y="362" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1B3A6B">STRATEGY</text>
  <text x="195" y="378" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1B3A6B">Grow — deploy capacity</text>
  <rect x="430" y="344" width="350" height="42" fill="#FFFFFF"/>
  <text x="605" y="362" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#C9A84C">STRATEGY</text>
  <text x="605" y="378" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#2C2C2C">Restrict — prioritise quality</text>

  <!-- Outer border -->
  <rect x="20" y="114" width="760" height="272" fill="none" stroke="#1B3A6B" stroke-width="2" rx="2"/>
  <!-- Centre divider -->
  <line x1="400" y1="62" x2="400" y2="386" stroke="#1B3A6B" stroke-width="2"/>
  <!-- Horizontal dividers -->
  <line x1="20" y1="160" x2="780" y2="160" stroke="#1B3A6B" stroke-width="1"/>
  <line x1="20" y1="206" x2="780" y2="206" stroke="#1B3A6B" stroke-width="1"/>
  <line x1="20" y1="252" x2="780" y2="252" stroke="#1B3A6B" stroke-width="1"/>
  <line x1="20" y1="298" x2="780" y2="298" stroke="#1B3A6B" stroke-width="1"/>
  <line x1="20" y1="344" x2="780" y2="344" stroke="#1B3A6B" stroke-width="1"/>

  <!-- Footer -->
  <text x="400" y="410" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#999">ciiassignmenthelp.com</text>
</svg>
