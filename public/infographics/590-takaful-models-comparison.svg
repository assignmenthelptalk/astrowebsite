  <text x="24" y="338" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#1B3A6B">Malaysia / Southeast Asia</text>

  <text x="292" y="320" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="bold" fill="#1B3A6B" letter-spacing="0.8">PRIMARY MARKET</text>
  <text x="292" y="338" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#1B3A6B">GCC / Saudi Arabia / UAE</text>

  <text x="560" y="320" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="bold" fill="#C9A84C" letter-spacing="0.8">PRIMARY MARKET</text>
  <text x="560" y="338" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="white">Malaysia (BNM-approved)</text>

  <!-- ROW 6: Transparency — y=352 -->
  <rect x="12" y="352" width="242" height="42" rx="0" ry="0" fill="#F0F4FA" stroke="#D0D8E8" stroke-width="1"/>
  <rect x="280" y="352" width="242" height="42" fill="#FDF6E3" stroke="#D0D8E8" stroke-width="1"/>
  <rect x="548" y="352" width="242" height="42" fill="#F0F4FA" stroke="#D0D8E8" stroke-width="1"/>
  <!-- Rounded bottom corners via clip -->
  <rect x="12" y="376" width="242" height="18" rx="0" ry="0" fill="#F0F4FA" stroke="#D0D8E8" stroke-width="1"/>
  <rect x="280" y="376" width="242" height="18" fill="#FDF6E3" stroke="#D0D8E8" stroke-width="1"/>
  <rect x="548" y="376" width="242" height="18" fill="#F0F4FA" stroke="#D0D8E8" stroke-width="1"/>

  <text x="24" y="366" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="bold" fill="#C9A84C" letter-spacing="0.8">TRANSPARENCY LEVEL</text>
  <!-- Medium bar -->
  <rect x="24" y="372" width="80" height="10" rx="5" ry="5" fill="#1B3A6B" fill-opacity="0.30"/>
  <rect x="24" y="372" width="52" height="10" rx="5" ry="5" fill="#1B3A6B"/>
  <text x="112" y="382" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#1B3A6B">Medium</text>
  <text x="24" y="392" font-family="Arial,Helvetica,sans-serif" font-size="9" fill="#555555" font-style="italic">(performance-linked)</text>

  <text x="292" y="366" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="bold" fill="#1B3A6B" letter-spacing="0.8">TRANSPARENCY LEVEL</text>
  <!-- High bar -->
  <rect x="292" y="372" width="100" height="10" rx="5" ry="5" fill="#1B3A6B" fill-opacity="0.20"/>
  <rect x="292" y="372" width="100" height="10" rx="5" ry="5" fill="#1B3A6B"/>
  <text x="398" y="382" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#1B3A6B">High</text>
  <text x="292" y="392" font-family="Arial,Helvetica,sans-serif" font-size="9" fill="#555555" font-style="italic">(fee fixed regardless of fund)</text>

  <text x="560" y="366" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="bold" fill="#C9A84C" letter-spacing="0.8">TRANSPARENCY LEVEL</text>
  <!-- Medium-High bar -->
  <rect x="560" y="372" width="100" height="10" rx="5" ry="5" fill="white" fill-opacity="0.20"/>
  <rect x="560" y="372" width="76" height="10" rx="5" ry="5" fill="white"/>
  <text x="642" y="382" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="white">Med-High</text>

  <!-- ==================== BOTTOM TABARRU BANNER ==================== -->
  <rect x="0" y="402" width="800" height="72" fill="#C9A84C"/>

  <!-- Arabic-styled ornamental divider -->
  <line x1="40" y1="416" x2="760" y2="416" stroke="#1B3A6B" stroke-width="0.75" stroke-dasharray="4,3"/>

  <text x="400" y="436" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="14" font-weight="bold" fill="#1B3A6B">All models use TABARRU — charitable contribution replacing commercial premium.</text>
  <text x="400" y="454" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11.5" fill="#1B3A6B">Fund invested in Shariah-compliant instruments only.</text>
  <text x="400" y="470" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#1B3A6B">CII 590 Takaful Examination Support  |  ciiassignmenthelp.com</text>
