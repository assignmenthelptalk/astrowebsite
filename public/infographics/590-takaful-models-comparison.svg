  <rect x="280" y="214" width="242" height="46" fill="#FEFAF0" stroke="#D0D8E8" stroke-width="1"/>
  <rect x="548" y="214" width="242" height="46" fill="white" stroke="#D0D8E8" stroke-width="1"/>

