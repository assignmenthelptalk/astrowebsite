  <text x="24" y="256" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#555555" font-style="italic">(e.g. 60/40 operator/participants)</text>

  <text x="292" y="228" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="bold" fill="#1B3A6B" letter-spacing="0.8">SURPLUS DISTRIBUTION</text>
  <text x="292" y="244" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#1B3A6B">All surplus to participants</text>
  <text x="292" y="256" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#555555" font-style="italic">(Operator fee already fixed)</text>

  <text x="560" y="228" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="bold" fill="#C9A84C" letter-spacing="0.8">SURPLUS DISTRIBUTION</text>
  <text x="560" y="244" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="white">Investment profit shared;</text>
  <text x="560" y="256" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="white">u/w surplus → participants</text>

  <!-- ROW 4: Deficit — y=260 -->
