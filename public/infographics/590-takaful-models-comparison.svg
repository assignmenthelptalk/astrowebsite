<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 800 520">
  <defs>
    <style>
      .col-header { font-family: Georgia, 'Times New Roman', serif; font-size: 16px; font-weight: bold; }
      .row-label { font-family: Arial, Helvetica, sans-serif; font-size: 9px; font-weight: bold; letter-spacing: 0.8px; text-transform: uppercase; }
      .row-value { font-family: Arial, Helvetica, sans-serif; font-size: 11px; }
      .banner-heading { font-family: Georgia, 'Times New Roman', serif; font-size: 13px; font-weight: bold; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="#F8F9FC"/>

  <!-- Title Bar -->
  <rect x="0" y="0" width="800" height="54" fill="#1B3A6B"/>
  <text x="400" y="22" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="20" font-weight="bold" fill="white">590 Takaful — Three Operational Models</text>
  <text x="400" y="43" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#C9A84C">Mudarabah | Wakalah | Hybrid — Side-by-Side Comparison</text>

  <!-- ==================== COLUMN HEADERS ==================== -->

  <!-- Col 1: Mudarabah (navy) -->
  <rect x="12" y="66" width="242" height="46" rx="6" ry="6" fill="#1B3A6B"/>
  <text x="133" y="85" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="17" font-weight="bold" fill="white">Mudarabah</text>
  <text x="133" y="103" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#C9A84C">Profit-Sharing Model</text>

  <!-- Col 2: Wakalah (gold) -->
  <rect x="280" y="66" width="242" height="46" rx="6" ry="6" fill="#C9A84C"/>
  <text x="401" y="85" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="17" font-weight="bold" fill="#1B3A6B">Wakalah</text>
  <text x="401" y="103" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#1B3A6B">Fixed-Fee Agency Model</text>

  <!-- Col 3: Hybrid (navy) -->
  <rect x="548" y="66" width="242" height="46" rx="6" ry="6" fill="#1B3A6B"/>
  <text x="669" y="85" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="17" font-weight="bold" fill="white">Hybrid</text>
  <text x="669" y="103" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#C9A84C">Wakalah + Mudarabah</text>

  <!-- ==================== ROW DEFINITIONS ==================== -->
  <!-- Rows: y start 122, each row height 46, 6 rows = 276px, ends at 398 -->

  <!-- ROW 1: Operator Role — y=122 -->
  <rect x="12" y="122" width="242" height="46" fill="white" stroke="#D0D8E8" stroke-width="1"/>
  <rect x="280" y="122" width="242" height="46" fill="#FEFAF0" stroke="#D0D8E8" stroke-width="1"/>
  <rect x="548" y="122" width="242" height="46" fill="white" stroke="#D0D8E8" stroke-width="1"/>

  <text x="24" y="136" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="bold" fill="#C9A84C" letter-spacing="0.8">OPERATOR ROLE</text>
  <text x="24" y="154" font-family="Arial,Helvetica,sans-serif" font-size="11.5" fill="#1B3A6B">Mudarib</text>
  <text x="24" y="168" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#555555" font-style="italic">(Business partner)</text>

  <text x="292" y="136" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="bold" fill="#1B3A6B" letter-spacing="0.8">OPERATOR ROLE</text>
  <text x="292" y="154" font-family="Arial,Helvetica,sans-serif" font-size="11.5" fill="#1B3A6B">Wakeel</text>
  <text x="292" y="168" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#555555" font-style="italic">(Agent)</text>

  <text x="560" y="136" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="bold" fill="#C9A84C" letter-spacing="0.8">OPERATOR ROLE</text>
  <text x="560" y="154" font-family="Arial,Helvetica,sans-serif" font-size="11.5" fill="white">Agent + Partner</text>
  <text x="560" y="168" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#C9A84C" font-style="italic">(Dual capacity)</text>

  <!-- ROW 2: Operator Income — y=168 -->
  <rect x="12" y="168" width="242" height="46" fill="#F0F4FA" stroke="#D0D8E8" stroke-width="1"/>
  <rect x="280" y="168" width="242" height="46" fill="#FDF6E3" stroke="#D0D8E8" stroke-width="1"/>
  <rect x="548" y="168" width="242" height="46" fill="#F0F4FA" stroke="#D0D8E8" stroke-width="1"/>

  <text x="24" y="182" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="bold" fill="#C9A84C" letter-spacing="0.8">OPERATOR INCOME</text>
  <text x="24" y="198" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#1B3A6B">Share of fund surplus</text>
  <text x="24" y="210" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#555555" font-style="italic">(Performance-linked)</text>

  <text x="292" y="182" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="bold" fill="#1B3A6B" letter-spacing="0.8">OPERATOR INCOME</text>
  <text x="292" y="198" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#1B3A6B">Fixed fee: 10–35% of</text>
  <text x="292" y="210" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#1B3A6B">contributions</text>

  <text x="560" y="182" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="bold" fill="#C9A84C" letter-spacing="0.8">OPERATOR INCOME</text>
  <text x="560" y="198" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="white">Wakalah fee +</text>
