  <rect x="280" y="260" width="242" height="46" fill="#FDF6E3" stroke="#D0D8E8" stroke-width="1"/>
  <rect x="548" y="260" width="242" height="46" fill="#F0F4FA" stroke="#D0D8E8" stroke-width="1"/>

