  <text x="24" y="290" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#1B3A6B">Operator provides Qard</text>
  <text x="24" y="302" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#555555" font-style="italic">(Interest-free loan)</text>

  <text x="292" y="274" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="bold" fill="#1B3A6B" letter-spacing="0.8">DEFICIT HANDLING</text>
  <text x="292" y="290" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#1B3A6B">Operator provides Qard</text>
  <text x="292" y="302" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#555555" font-style="italic">(Interest-free loan)</text>

  <text x="560" y="274" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="bold" fill="#C9A84C" letter-spacing="0.8">DEFICIT HANDLING</text>
  <text x="560" y="290" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="white">Operator provides Qard</text>
  <text x="560" y="302" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#C9A84C" font-style="italic">(Interest-free loan)</text>

  <!-- ROW 5: Market — y=306 -->
  <rect x="12" y="306" width="242" height="46" fill="white" stroke="#D0D8E8" stroke-width="1"/>
  <rect x="280" y="306" width="242" height="46" fill="#FEFAF0" stroke="#D0D8E8" stroke-width="1"/>
  <rect x="548" y="306" width="242" height="46" fill="white" stroke="#D0D8E8" stroke-width="1"/>

