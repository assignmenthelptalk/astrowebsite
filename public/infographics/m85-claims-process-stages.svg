<svg width="100%" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="400" fill="#F8F9FC"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="52" fill="#1B3A6B"/>
  <text x="400" y="33" text-anchor="middle" fill="white" font-size="19" font-weight="bold">M85 Claims Handling — Key Stages</text>

  <!-- ===== STEP BOXES ===== -->

  <!-- Step 1: FNOL (navy) -->
  <rect x="14" y="70" width="134" height="130" rx="8" fill="#1B3A6B"/>
  <rect x="14" y="70" width="134" height="36" rx="8" fill="#1B3A6B"/>
  <rect x="14" y="94" width="134" height="12" fill="#1B3A6B"/>
  <text x="81" y="91" text-anchor="middle" fill="#C9A84C" font-size="11" font-weight="bold">STEP 1</text>
  <text x="81" y="108" text-anchor="middle" fill="white" font-size="12" font-weight="bold">FNOL</text>
  <line x1="28" y1="116" x2="134" y2="116" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
  <text x="81" y="131" text-anchor="middle" fill="#C9A84C" font-size="10" font-weight="bold">First Notification</text>
  <text x="81" y="144" text-anchor="middle" fill="#C9A84C" font-size="10" font-weight="bold">of Loss</text>
  <text x="81" y="161" text-anchor="middle" fill="white" font-size="10">Policy in force?</text>
  <text x="81" y="175" text-anchor="middle" fill="white" font-size="10">Coverage check.</text>
  <text x="81" y="189" text-anchor="middle" fill="white" font-size="10">Preliminary reserve</text>
  <text x="81" y="200" text-anchor="middle" fill="white" font-size="10">set.</text>

  <!-- Arrow 1→2 -->
  <polygon points="152,132 166,125 166,139" fill="#1B3A6B"/>
  <line x1="148" y1="132" x2="165" y2="132" stroke="#1B3A6B" stroke-width="2.5"/>

  <!-- Step 2: Investigation (gold) -->
  <rect x="168" y="70" width="134" height="130" rx="8" fill="#C9A84C"/>
  <text x="235" y="91" text-anchor="middle" fill="#1B3A6B" font-size="11" font-weight="bold">STEP 2</text>
  <text x="235" y="108" text-anchor="middle" fill="#1B3A6B" font-size="12" font-weight="bold">Investigation</text>
  <line x1="182" y1="116" x2="288" y2="116" stroke="#1B3A6B" stroke-width="1" opacity="0.4"/>
  <text x="235" y="136" text-anchor="middle" fill="#1B3A6B" font-size="10">Evidence gathering.</text>
  <text x="235" y="152" text-anchor="middle" fill="#1B3A6B" font-size="10">Liability assessment.</text>
  <text x="235" y="168" text-anchor="middle" fill="#1B3A6B" font-size="10">Expert appointment.</text>

  <!-- Arrow 2→3 -->
  <polygon points="306,132 320,125 320,139" fill="#1B3A6B"/>
  <line x1="302" y1="132" x2="319" y2="132" stroke="#1B3A6B" stroke-width="2.5"/>

  <!-- Step 3: Coverage Analysis (navy) -->
  <rect x="322" y="70" width="134" height="130" rx="8" fill="#1B3A6B"/>
  <text x="389" y="91" text-anchor="middle" fill="#C9A84C" font-size="11" font-weight="bold">STEP 3</text>
  <text x="389" y="108" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Coverage</text>
  <text x="389" y="122" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Analysis</text>
  <line x1="336" y1="130" x2="442" y2="130" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
  <text x="389" y="148" text-anchor="middle" fill="white" font-size="10">Policy interpretation.</text>
  <text x="389" y="163" text-anchor="middle" fill="white" font-size="10">Exclusions review.</text>
  <text x="389" y="178" text-anchor="middle" fill="#C9A84C" font-size="10">Wayne Tank principle.</text>

  <!-- Arrow 3→4 -->
  <polygon points="460,132 474,125 474,139" fill="#1B3A6B"/>
  <line x1="456" y1="132" x2="473" y2="132" stroke="#1B3A6B" stroke-width="2.5"/>

  <!-- Step 4: Quantification (gold) -->
  <rect x="476" y="70" width="134" height="130" rx="8" fill="#C9A84C"/>
  <text x="543" y="91" text-anchor="middle" fill="#1B3A6B" font-size="11" font-weight="bold">STEP 4</text>
  <text x="543" y="108" text-anchor="middle" fill="#1B3A6B" font-size="12" font-weight="bold">Quantification</text>
  <line x1="490" y1="116" x2="596" y2="116" stroke="#1B3A6B" stroke-width="1" opacity="0.4"/>
  <text x="543" y="136" text-anchor="middle" fill="#1B3A6B" font-size="10">Loss measurement.</text>
  <text x="543" y="152" text-anchor="middle" fill="#1B3A6B" font-size="10">BI methodology.</text>
  <text x="543" y="168" text-anchor="middle" fill="#1B3A6B" font-size="10">Ogden Tables</text>
  <text x="543" y="182" text-anchor="middle" fill="#1B3A6B" font-size="10">(liability).</text>

  <!-- Arrow 4→5 -->
  <polygon points="614,132 628,125 628,139" fill="#1B3A6B"/>
  <line x1="610" y1="132" x2="627" y2="132" stroke="#1B3A6B" stroke-width="2.5"/>

  <!-- Step 5: Settlement (navy) -->
  <rect x="630" y="70" width="156" height="130" rx="8" fill="#1B3A6B"/>
  <text x="708" y="91" text-anchor="middle" fill="#C9A84C" font-size="11" font-weight="bold">STEP 5</text>
  <text x="708" y="108" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Settlement</text>
  <line x1="644" y1="116" x2="772" y2="116" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
  <text x="708" y="136" text-anchor="middle" fill="white" font-size="10">Negotiation.</text>
  <text x="708" y="152" text-anchor="middle" fill="white" font-size="10">Payment.</text>
  <text x="708" y="168" text-anchor="middle" fill="#C9A84C" font-size="10">Subrogation trigger.</text>

  <!-- ===== BOTTOM TWO BOXES ===== -->

  <!-- Left: IBNR box (navy border) -->
  <rect x="14" y="218" width="376" height="82" rx="8" fill="white" stroke="#1B3A6B" stroke-width="2"/>
  <rect x="14" y="218" width="376" height="28" rx="8" fill="#1B3A6B"/>
  <rect x="14" y="234" width="376" height="12" fill="#1B3A6B"/>
  <text x="202" y="237" text-anchor="middle" fill="white" font-size="12" font-weight="bold">IBNR Reserving — Bornhuetter-Ferguson Method</text>
  <text x="202" y="262" text-anchor="middle" fill="#1B3A6B" font-size="13">Expected losses × % unreported = IBNR</text>
  <text x="202" y="284" text-anchor="middle" fill="#1B3A6B" font-size="11" font-style="italic">Blends prior expectations with actual emergence to project ultimate losses</text>

  <!-- Right: Fraud Indicators box (gold border) -->
  <rect x="410" y="218" width="376" height="82" rx="8" fill="white" stroke="#C9A84C" stroke-width="2"/>
  <rect x="410" y="218" width="376" height="28" rx="8" fill="#C9A84C"/>
  <rect x="410" y="234" width="376" height="12" fill="#C9A84C"/>
  <text x="598" y="237" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Fraud Indicators</text>
  <text x="598" y="259" text-anchor="middle" fill="#1B3A6B" font-size="11">Early claim  ·  Inconsistent evidence</text>
  <text x="598" y="277" text-anchor="middle" fill="#1B3A6B" font-size="11">Prior losses  ·  CIFAS markers</text>

  <!-- ===== FOOTER ===== -->
  <rect x="0" y="316" width="800" height="84" fill="#1B3A6B"/>
  <text x="400" y="342" text-anchor="middle" fill="#C9A84C" font-size="12" font-weight="bold">KEY LEGAL PRINCIPLES IN CLAIMS HANDLING</text>
  <text x="400" y="363" text-anchor="middle" fill="white" font-size="11">Proximate Cause  ·  Indemnity  ·  Subrogation  ·  Contribution  ·  Utmost Good Faith</text>
  <text x="400" y="382" text-anchor="middle" fill="white" font-size="11">Wayne Tank: where two causes operate, the proximate cause determines liability</text>
</svg>
