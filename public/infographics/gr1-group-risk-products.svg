<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="100%" role="img" aria-labelledby="gr1-products-title">
  <title id="gr1-products-title">Group Risk Products Comparison — Group Life, Group Income Protection, Group Critical Illness, GR1 CII</title>

  <!-- Background -->
  <rect width="800" height="380" fill="#F8F9FC"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="60" fill="#1B3A6B"/>
  <text x="400" y="22" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#C9A84C" font-weight="600" letter-spacing="1">GR1 — GROUP RISK</text>
  <text x="400" y="44" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#FFFFFF" font-weight="700">Group Risk Products Comparison</text>

  <!-- Table structure -->
  <!-- Column widths: Feature col = 155px, each product col = 207px -->
  <!-- Col positions: 30, 185, 392, 599 -->
  <!-- Row height: 36px, starting at y=70 -->

  <!-- === HEADER ROW === -->
  <rect x="30" y="70" width="155" height="38" fill="#1B3A6B"/>
  <rect x="185" y="70" width="207" height="38" fill="#1B3A6B"/>
  <rect x="392" y="70" width="207" height="38" fill="#1B3A6B"/>
  <rect x="599" y="70" width="171" height="38" fill="#1B3A6B"/>

  <text x="107" y="94" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#C9A84C" font-weight="700">Feature</text>
  <text x="288" y="88" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="700">Group Life</text>
  <text x="288" y="103" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#C9A84C">Death in Service</text>
  <text x="495" y="88" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="700">Group Income Protection</text>
  <text x="495" y="103" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#C9A84C">Long-term Disability Income</text>
  <text x="684" y="88" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="700">Group Critical Illness</text>
  <text x="684" y="103" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#C9A84C">Living Benefit</text>

  <!-- Define row fills: alternating #FFFFFF / #F0F3FA -->
  <!-- Row 1: Benefit Trigger -->
  <rect x="30" y="108" width="155" height="34" fill="#1B3A6B" opacity="0.08"/>
  <rect x="185" y="108" width="207" height="34" fill="#FFFFFF"/>
  <rect x="392" y="108" width="207" height="34" fill="#FFFFFF"/>
  <rect x="599" y="108" width="171" height="34" fill="#FFFFFF"/>
  <text x="107" y="129" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1B3A6B" font-weight="600">Benefit trigger</text>
  <text x="288" y="129" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#2C2C2C">Death</text>
  <text x="495" y="129" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#2C2C2C">Long-term incapacity</text>
  <text x="684" y="129" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#2C2C2C">Critical illness diagnosis</text>

  <!-- Row 2: Benefit type -->
  <rect x="30" y="142" width="155" height="34" fill="#E8ECF4" opacity="0.55"/>
  <rect x="185" y="142" width="207" height="34" fill="#F0F3FA"/>
  <rect x="392" y="142" width="207" height="34" fill="#F0F3FA"/>
  <rect x="599" y="142" width="171" height="34" fill="#F0F3FA"/>
  <text x="107" y="163" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1B3A6B" font-weight="600">Benefit type</text>
  <text x="288" y="163" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#2C2C2C">Lump sum</text>
  <text x="495" y="155" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#2C2C2C">Regular income</text>
  <text x="495" y="169" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9.5" fill="#2C2C2C">(% of pre-absence salary)</text>
  <text x="684" y="163" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#2C2C2C">Lump sum</text>

  <!-- Row 3: Deferred period -->
  <rect x="30" y="176" width="155" height="34" fill="#1B3A6B" opacity="0.08"/>
  <rect x="185" y="176" width="207" height="34" fill="#FFFFFF"/>
  <rect x="392" y="176" width="207" height="34" fill="#FFFFFF"/>
  <rect x="599" y="176" width="171" height="34" fill="#FFFFFF"/>
  <text x="107" y="197" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1B3A6B" font-weight="600">Deferred period</text>
  <text x="288" y="197" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#2C2C2C">None</text>
  <text x="495" y="189" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#2C2C2C">Typically 13 / 26 / 52 weeks</text>
  <text x="495" y="203" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9.5" fill="#2C2C2C">(aligns with employer sick pay)</text>
  <text x="684" y="189" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#2C2C2C">Survival period</text>
  <text x="684" y="203" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9.5" fill="#2C2C2C">(typically 28 days)</text>

  <!-- Row 4: Benefit period -->
  <rect x="30" y="210" width="155" height="34" fill="#E8ECF4" opacity="0.55"/>
  <rect x="185" y="210" width="207" height="34" fill="#F0F3FA"/>
  <rect x="392" y="210" width="207" height="34" fill="#F0F3FA"/>
  <rect x="599" y="210" width="171" height="34" fill="#F0F3FA"/>
  <text x="107" y="231" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1B3A6B" font-weight="600">Benefit period</text>
  <text x="288" y="231" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#2C2C2C">Immediate one-off payout</text>
  <text x="495" y="223" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#2C2C2C">To recovery, retirement,</text>
  <text x="495" y="237" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9.5" fill="#2C2C2C">or policy benefit period end</text>
  <text x="684" y="231" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#2C2C2C">Single payment on diagnosis</text>

  <!-- Row 5: Free Cover Limit -->
  <rect x="30" y="244" width="155" height="34" fill="#1B3A6B" opacity="0.08"/>
  <rect x="185" y="244" width="207" height="34" fill="#FFFFFF"/>
  <rect x="392" y="244" width="207" height="34" fill="#FFFFFF"/>
  <rect x="599" y="244" width="171" height="34" fill="#FFFFFF"/>
  <text x="107" y="265" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1B3A6B" font-weight="600">Free Cover Limit</text>
  <text x="288" y="257" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#2C2C2C">Yes — below FCL,</text>
  <text x="288" y="271" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9.5" fill="#2C2C2C">no medical evidence required</text>
  <text x="495" y="265" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#2C2C2C">Yes</text>
  <text x="684" y="265" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#2C2C2C">Yes</text>

  <!-- Row 6: Underwriting -->
  <rect x="30" y="278" width="155" height="40" fill="#E8ECF4" opacity="0.55"/>
  <rect x="185" y="278" width="207" height="40" fill="#F0F3FA"/>
  <rect x="392" y="278" width="207" height="40" fill="#F0F3FA"/>
  <rect x="599" y="278" width="171" height="40" fill="#F0F3FA"/>
  <text x="107" y="302" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1B3A6B" font-weight="600">Underwriting</text>
  <text x="288" y="292" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9.5" fill="#2C2C2C">Above FCL: full medical</text>
  <text x="288" y="306" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9.5" fill="#2C2C2C">evidence required</text>
  <text x="495" y="292" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9.5" fill="#2C2C2C">Experience/group rating</text>
  <text x="495" y="306" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9.5" fill="#2C2C2C">+ FCL for individuals</text>
  <text x="684" y="292" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9.5" fill="#2C2C2C">Above FCL: medical</text>
  <text x="684" y="306" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9.5" fill="#2C2C2C">evidence required</text>

  <!-- Table border lines (vertical) -->
  <line x1="185" y1="70" x2="185" y2="318" stroke="#E8ECF4" stroke-width="1.5"/>
  <line x1="392" y1="70" x2="392" y2="318" stroke="#E8ECF4" stroke-width="1.5"/>
  <line x1="599" y1="70" x2="599" y2="318" stroke="#E8ECF4" stroke-width="1.5"/>
  <line x1="770" y1="70" x2="770" y2="318" stroke="#E8ECF4" stroke-width="1.5"/>

  <!-- Horizontal row dividers -->
  <line x1="30" y1="108" x2="770" y2="108" stroke="#E8ECF4" stroke-width="1"/>
  <line x1="30" y1="142" x2="770" y2="142" stroke="#E8ECF4" stroke-width="1"/>
  <line x1="30" y1="176" x2="770" y2="176" stroke="#E8ECF4" stroke-width="1"/>
  <line x1="30" y1="210" x2="770" y2="210" stroke="#E8ECF4" stroke-width="1"/>
  <line x1="30" y1="244" x2="770" y2="244" stroke="#E8ECF4" stroke-width="1"/>
  <line x1="30" y1="278" x2="770" y2="278" stroke="#E8ECF4" stroke-width="1"/>

  <!-- Outer table border -->
  <rect x="30" y="70" width="740" height="248" fill="none" stroke="#1B3A6B" stroke-width="1.5"/>

  <!-- P11D note -->
  <text x="30" y="336" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#1B3A6B" font-weight="600">P11D Note:</text>
  <text x="90" y="336" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#2C2C2C">Group life premiums — generally P11D exempt.  Group income protection premiums — P11D reportable (taxable benefit for employee).</text>

  <!-- Footer -->
  <text x="400" y="365" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#999">ciiassignmenthelp.com</text>
</svg>
